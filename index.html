<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>...</title>
    <style>
        :root { --pink: #ff758c; --text: #2d3436; }
        
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #fff5f7 0%, #ffe4e9 100%);
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center; position: relative;
        }

        /* ĐỐM SÁNG TRANG TRÍ NỀN XUNG QUANH */
        .bg-decor {
            position: absolute; border-radius: 50%;
            background: white; opacity: 0.4; filter: blur(40px);
            z-index: 1; pointer-events: none;
        }

        /* HỘP QUÀ */
        #box-screen { cursor: pointer; animation: bounce 2s infinite; z-index: 10; }
        .box-icon { font-size: 90px; filter: drop-shadow(0 10px 20px rgba(255, 117, 140, 0.2)); }
        .instruction { color: #b2bec3; font-size: 13px; margin-top: 25px; letter-spacing: 2px; text-transform: uppercase; }

        /* --- NÂNG CẤP LÁ THƯ (CARD) --- */
        #letter-screen {
            display: none; width: 82%; max-width: 360px;
            /* Hiệu ứng kính mờ (Glassmorphism) */
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(15px); /* Làm mờ hậu cảnh */
            
            padding: 45px 25px; border-radius: 35px;
            box-shadow: 0 20px 60px rgba(255, 117, 140, 0.1);
            min-height: 250px; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative; z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.4);
            
            /* Đảm bảo hiệu ứng bên trong không tràn ra ngoài */
            overflow: hidden;
        }

        .message-text {
            font-size: 17px; color: var(--text); line-height: 1.8;
            font-weight: 500; transition: all 0.8s ease;
            opacity: 0; transform: translateY(15px);
            z-index: 5; /* Nổi lên trên hiệu ứng tuyết tim */
        }
        .show-text { opacity: 1; transform: translateY(0); }

        #final-photo {
            width: 100%; border-radius: 20px; margin-bottom: 25px;
            display: none; aspect-ratio: 1/1; object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 5;
        }

        /* --- HIỆU ỨNG TUYẾT TIM RƠI BÊN TRONG LÁ THƯ --- */
        .inner-heart {
            position: absolute; color: rgba(255, 117, 140, 0.2);
            pointer-events: none; animation: innerFall linear forwards;
            font-size: 16px;
        }
        @keyframes innerFall {
            from { transform: translateY(-5vh) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            to { transform: translateY(30vh) rotate(360deg); opacity: 0; }
        }

        /* Tim bay ở nền xung quanh (Giữ nguyên) */
        .bg-heart { position: absolute; color: #ffb3c1; opacity: 0.1; pointer-events: none; animation: floatUp 8s linear infinite; z-index: 2; }
        @keyframes floatUp { from { transform: translateY(110vh) rotate(0deg); } to { transform: translateY(-10vh) rotate(360deg); } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-25px); } }
    </style>
</head>
<body onclick="handleNext()">

    <div class="bg-decor" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    <div class="bg-decor" style="width: 300px; height: 300px; bottom: -50px; right: -50px;"></div>

    <div id="box-screen">
        <div class="box-icon">🎁</div>
        <div class="instruction">Chạm để mở tâm tư...</div>
    </div>

    <div id="letter-screen">
        <div id="inner-hearts-container" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0;"></div>
        
        <img src="https://i.ibb.co/WNLrbmjc/image.jpg" id="final-photo">
        <div id="msg" class="message-text"></div>
    </div>

    <script>
        let currentStep = 0;
        let innerHeartInterval; // Biến để quản lý hiệu ứng tim rơi bên trong

        const letterLines = [
            "Biết là anh bận anh mệt nhưng em cũng cần được để ý.",
            "Nếu anh cảm thấy mệt quá thì cứ nghỉ ngơi không cần gọi điện hay nhắn tin cho em, cứ như lúc trước đi ngủ xong ngày hôm sau nhắn cho em cũng được, vì em nghĩ ai cũng cần có không gian riêng.",
            "Em yêu anh ❤️"
        ];

        // Tạo tim bay nhẹ ở nền xung quanh (Giữ nguyên)
        function createBgHearts() {
            for(let i=0; i<10; i++) {
                const h = document.createElement('div');
                h.innerHTML = '❤️';
                h.className = 'bg-heart';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.fontSize = Math.random() * 10 + 10 + 'px';
                h.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(h);
            }
        }
        createBgHearts();

        // --- TẠO TIM RƠI LIÊN TỤC BÊN TRONG LÁ THƯ ---
        function createInnerHeart() {
            const container = document.getElementById('inner-hearts-container');
            const h = document.createElement('div');
            h.innerHTML = ['❤️', '🌸', '✨'][Math.floor(Math.random()*3)];
            h.className = 'inner-heart';
            h.style.left = Math.random() * 80 + 10 + '%'; // Phân bổ ngang trong card
            h.style.fontSize = Math.random() * 10 + 12 + 'px';
            h.style.animationDuration = Math.random() * 2 + 3 + 's';
            container.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }

        function handleNext() {
            const box = document.getElementById('box-screen');
            const letter = document.getElementById('letter-screen');
            const msgArea = document.getElementById('msg');
            const photo = document.getElementById('final-photo');

            if (currentStep === 0) {
                // Mở hộp quà
                box.style.display = 'none';
                letter.style.display = 'flex';
                updateContent(letterLines[0]);
                currentStep++;
                // Bắt đầu tạo tim rơi liên tục bên trong lá thư
                innerHeartInterval = setInterval(createInnerHeart, 500);
            } else if (currentStep < letterLines.length) {
                // Đổi câu
                msgArea.classList.remove('show-text');
                setTimeout(() => {
                    if (currentStep === 2) {
                        // Hiện ảnh và đổi kiểu chữ câu cuối
                        photo.style.display = 'block';
                        photo.style.animation = 'fadeIn 1.5s forwards';
                        msgArea.style.fontSize = '24px';
                        msgArea.style.color = '#ff758c';
                        msgArea.style.fontWeight = '800';
                        // Giảm tốc độ rơi tim để tập trung vào câu yêu
                        clearInterval(innerHeartInterval);
                        innerHeartInterval = setInterval(createInnerHeart, 1000);
                    }
                    updateContent(letterLines[currentStep]);
                    currentStep++;
                }, 400);
            }
        }

        function updateContent(text) {
            const msgArea = document.getElementById('msg');
            msgArea.innerText = text;
            msgArea.classList.add('show-text');
            window.speechSynthesis.cancel();
            const talk = new SpeechSynthesisUtterance(text);
            talk.lang = 'vi-VN';
            window.speechSynthesis.speak(talk);
        }
    </script>
</body>
</html>
